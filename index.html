<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>webCVメタコピーツール</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Zen+Kaku+Gothic+New:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
    :root {
        /* ライトなメタリックシルバー基調。テカリ（クロームメッキ調）を全面に効かせる */
        --bg-0: #c8ccd2;            /* ベースのシルバーグレー */
        --surface: rgba(255, 255, 255, 0.55);      /* パネル面（明るい金属面） */
        --surface-hi: rgba(255, 255, 255, 0.78);   /* ホバー時のより明るい面 */
        --border: rgba(120, 130, 145, 0.35);       /* 金属エッジの陰 */
        --border-hi: rgba(150, 165, 185, 0.65);    /* ハイライト寄りのエッジ */
        /* アクセント群（変数名は互換のため流用）。クローム＋スチールブルーの光沢 */
        --cyan: #4a6585;      /* メインのスチールブルー（文字アクセント） */
        --blue: #6b7d92;      /* 中間のスチールグレー */
        --purple: #9aa6b4;    /* 明るいシルバー */
        --text: #2b333d;      /* 濃いスチールグレーの文字 */
        --text-dim: #5a6470;
        --text-faint: #8a93a0;
        /* クロームメッキ調グラデーション（金属の反射を表現） */
        --chrome: linear-gradient(160deg, #ffffff 0%, #e2e6ec 18%, #aab2bd 46%, #d8dde3 60%, #8e97a3 82%, #c4cad2 100%);
        --chrome-edge: linear-gradient(180deg, #ffffff 0%, #b9c0ca 50%, #7c8593 100%);
        --mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
        --sans: 'Zen Kaku Gothic New', -apple-system, BlinkMacSystemFont, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, system-ui, sans-serif;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }

    body {
        min-height: 100vh;
        font-family: var(--sans);
        color: var(--text);
        line-height: 1.8;
        font-weight: 500;
        /* ベースは斜めの金属反射グラデーション */
        background:
            linear-gradient(135deg, #eef1f5 0%, #c3c9d1 25%, #dde1e7 50%, #b3bac4 75%, #e6e9ee 100%);
        background-attachment: fixed;
        position: relative;
        overflow-x: hidden;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
    }

    /* 背景の環境光グロー（金属面の白い反射ハイライト） */
    body::before {
        content: '';
        position: fixed;
        inset: 0;
        background:
            radial-gradient(ellipse 70% 50% at 15% 0%, rgba(255, 255, 255, 0.65), transparent 60%),
            radial-gradient(ellipse 60% 60% at 100% 100%, rgba(255, 255, 255, 0.4), transparent 60%),
            radial-gradient(ellipse 50% 80% at 50% 50%, rgba(120, 140, 165, 0.18), transparent 70%);
        pointer-events: none;
        z-index: 0;
    }

    /* ブラッシュドメタル風の細い横ヘアライン（周辺にフェード） */
    body::after {
        content: '';
        position: fixed;
        inset: 0;
        background-image:
            repeating-linear-gradient(180deg, rgba(255, 255, 255, 0.10) 0px, rgba(255, 255, 255, 0.10) 1px, transparent 1px, transparent 3px),
            repeating-linear-gradient(180deg, rgba(90, 100, 115, 0.05) 0px, rgba(90, 100, 115, 0.05) 1px, transparent 1px, transparent 4px);
        mask-image: radial-gradient(ellipse 80% 60% at 50% 40%, black 25%, transparent 80%);
        -webkit-mask-image: radial-gradient(ellipse 80% 60% at 50% 40%, black 25%, transparent 80%);
        pointer-events: none;
        z-index: 0;
    }

    main {
        max-width: 780px;
        margin: 0 auto;
        padding: 64px 24px 96px;
        position: relative;
        z-index: 1;
    }

    /* 上部クロームバー（パンくず風） */
    .chrome {
        display: flex;
        align-items: center;
        gap: 10px;
        font-family: var(--mono);
        font-size: 11px;
        color: var(--text-faint);
        letter-spacing: 0.08em;
        margin-bottom: 36px;
        padding-bottom: 18px;
        border-bottom: 1px solid var(--border);
    }

    .chrome-dot {
        width: 7px; height: 7px; border-radius: 50%;
        background: radial-gradient(circle at 30% 30%, #ffffff, #6b7d92 70%);
        box-shadow: 0 0 6px rgba(255,255,255,0.8), 0 1px 2px rgba(0,0,0,0.3);
        animation: pulse 2.4s ease-in-out infinite;
    }

    @keyframes pulse {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.55; transform: scale(0.92); }
    }

    .chrome-path { color: var(--text-dim); }
    .chrome-path .sep { color: var(--text-faint); margin: 0 7px; }

    /* ヘッダー */
    .page-header { margin-bottom: 52px; }

    .eyebrow {
        display: inline-block;
        font-family: var(--mono);
        font-size: 11px;
        font-weight: 500;
        letter-spacing: 0.22em;
        color: var(--cyan);
        text-transform: uppercase;
        margin-bottom: 22px;
        padding: 6px 12px;
        border: 1px solid var(--border-hi);
        border-radius: 4px;
        background: var(--chrome);
        box-shadow: 0 1px 2px rgba(0,0,0,0.18), inset 0 1px 0 rgba(255,255,255,0.7);
    }

    h1 {
        font-size: clamp(30px, 4.4vw, 44px);
        font-weight: 900;
        letter-spacing: -0.02em;
        margin: 0;
        line-height: 1.25;
        color: var(--text);
        text-align: center; /* タイトルを中央揃え */
        text-shadow: 0 1px 0 rgba(255,255,255,0.6), 0 -1px 0 rgba(80,90,105,0.25);
    }

    h1 .accent {
        background: linear-gradient(180deg, #5a6470 0%, #2b333d 45%, #8a93a0 55%, #3a434e 100%);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        color: transparent;
        text-shadow: 0 1px 0 rgba(255,255,255,0.5);
    }

    .subtitle {
        font-family: var(--mono);
        font-size: 12.5px;
        color: var(--text-faint);
        margin-top: 14px;
        letter-spacing: 0.02em;
    }

    /* ステップカード群 */
    .steps { display: flex; flex-direction: column; gap: 14px; }

    .step {
        display: flex;
        gap: 22px;
        padding: 22px 26px;
        background:
            linear-gradient(180deg, rgba(255,255,255,0.85) 0%, rgba(255,255,255,0.45) 8%, rgba(220,225,231,0.55) 100%),
            var(--surface);
        backdrop-filter: blur(8px) saturate(1.1);
        -webkit-backdrop-filter: blur(8px) saturate(1.1);
        border: 1px solid var(--border);
        border-top-color: rgba(255,255,255,0.9);
        border-radius: 14px;
        box-shadow:
            0 2px 6px rgba(60,70,85,0.18),
            0 8px 24px rgba(60,70,85,0.10),
            inset 0 1px 0 rgba(255,255,255,0.85);
        transition: border-color 0.3s ease, background 0.3s ease, transform 0.3s ease, box-shadow 0.3s ease;
        position: relative;
        overflow: hidden;
    }

    /* 上面を斜めに走る光の反射 */
    .step::after {
        content: '';
        position: absolute;
        top: 0; left: -40%;
        width: 50%; height: 100%;
        background: linear-gradient(105deg, transparent, rgba(255,255,255,0.45), transparent);
        transform: skewX(-18deg);
        pointer-events: none;
    }

    .step:hover {
        border-color: var(--border-hi);
        background:
            linear-gradient(180deg, rgba(255,255,255,0.95) 0%, rgba(255,255,255,0.6) 8%, rgba(225,230,236,0.7) 100%),
            var(--surface-hi);
        transform: translateY(-1px);
        box-shadow:
            0 4px 10px rgba(60,70,85,0.22),
            0 12px 30px rgba(60,70,85,0.14),
            inset 0 1px 0 rgba(255,255,255,0.95);
    }

    .step-num {
        flex-shrink: 0;
        width: 44px;
        height: 44px;
        border-radius: 10px;
        background: var(--chrome);
        border: 1px solid rgba(255,255,255,0.8);
        color: #3a434e;
        font-family: var(--mono);
        font-size: 15px;
        font-weight: 700;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow:
            0 2px 5px rgba(60,70,85,0.30),
            inset 0 1px 0 rgba(255, 255, 255, 0.95),
            inset 0 -2px 3px rgba(80,90,105,0.30);
        text-shadow: 0 1px 0 rgba(255,255,255,0.8);
        letter-spacing: 0;
        position: relative;
        z-index: 1;
    }

    /* 「01」「02」表記用のゼロ */
    .step-num::before {
        content: '0';
        opacity: 0.55;
    }

    .step-body { flex: 1; padding-top: 7px; position: relative; z-index: 1; }
    .step-body p { margin: 0; color: var(--text); }
    .step-body strong { color: var(--cyan); font-weight: 700; }

    kbd {
        display: inline-block;
        font-family: var(--mono);
        font-size: 11px;
        font-weight: 500;
        padding: 2px 8px;
        background: var(--chrome);
        border: 1px solid var(--border-hi);
        border-bottom: 2px solid rgba(110,120,135,0.7);
        border-radius: 5px;
        box-shadow: inset 0 1px 0 rgba(255,255,255,0.85);
        color: var(--text);
        margin: 0 1px;
        line-height: 1.4;
        vertical-align: baseline;
    }

    /* ブックマークレット ドロップゾーン */
    .drop-zone {
        margin: 22px 0;
        padding: 38px 28px;
        text-align: center;
        background:
            radial-gradient(ellipse 60% 100% at 50% 30%, rgba(255,255,255,0.6), transparent 70%),
            linear-gradient(180deg, rgba(210,216,224,0.75), rgba(180,188,198,0.85));
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border: 1px dashed rgba(110,120,135,0.55);
        border-radius: 16px;
        box-shadow:
            inset 0 1px 0 rgba(255,255,255,0.85),
            inset 0 -2px 6px rgba(80,90,105,0.18),
            0 2px 8px rgba(60,70,85,0.12);
        position: relative;
        overflow: hidden;
    }

    .drop-zone::before {
        content: '';
        position: absolute;
        top: 0; left: 0; right: 0;
        height: 1px;
        background: linear-gradient(90deg, transparent, rgba(255,255,255,0.9), transparent);
    }

    .drop-zone-tag {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 14px;
        font-family: var(--mono);
        font-size: 10px;
        letter-spacing: 0.32em;
        color: var(--text-faint);
        margin-bottom: 22px;
        text-transform: uppercase;
    }

    .drop-zone-tag::before,
    .drop-zone-tag::after {
        content: '';
        flex: 1;
        max-width: 56px;
        height: 1px;
        background: linear-gradient(90deg, transparent, var(--border-hi), transparent);
    }

    .bookmarklet-link {
        display: inline-flex;
        align-items: center;
        gap: 12px;
        padding: 15px 30px;
        font-family: var(--sans);
        font-size: 16px;
        font-weight: 700;
        color: #2b333d;
        text-decoration: none;
        border-radius: 10px;
        background: var(--chrome);
        border: 1px solid rgba(255,255,255,0.85);
        text-shadow: 0 1px 0 rgba(255,255,255,0.7);
        box-shadow:
            0 2px 5px rgba(60,70,85,0.30),
            0 8px 22px rgba(60,70,85,0.18),
            inset 0 1px 0 rgba(255, 255, 255, 0.95),
            inset 0 -2px 4px rgba(80,90,105,0.30);
        cursor: grab;
        transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        letter-spacing: 0.02em;
        position: relative;
    }

    /* ドラッグハンドル風のドット */
    .bookmarklet-link::before {
        content: '';
        width: 8px;
        height: 12px;
        background-image:
            radial-gradient(circle, currentColor 1.2px, transparent 1.5px),
            radial-gradient(circle, currentColor 1.2px, transparent 1.5px);
        background-size: 4px 4px;
        background-position: 0 0, 4px 0;
        background-repeat: repeat-y;
        opacity: 0.5;
    }

    .bookmarklet-link:hover {
        transform: translateY(-3px);
        box-shadow:
            0 4px 8px rgba(60,70,85,0.34),
            0 16px 36px rgba(60,70,85,0.24),
            inset 0 1px 0 rgba(255, 255, 255, 1),
            inset 0 -2px 4px rgba(80,90,105,0.30);
    }

    .bookmarklet-link:active { cursor: grabbing; transform: translateY(-1px); }

    /* 手順3の動画ブロック */
    .step-video-title {
        margin: 0 0 12px;
        font-weight: 700;
        color: var(--text);
    }

    /* レスポンシブな16:9埋め込み枠（金属フレーム） */
    .video-frame {
        position: relative;
        width: 100%;
        aspect-ratio: 16 / 9;
        border-radius: 12px;
        overflow: hidden;
        background: #1a1d22;
        border: 1px solid rgba(255,255,255,0.7);
        box-shadow:
            0 2px 6px rgba(60,70,85,0.25),
            inset 0 1px 0 rgba(255,255,255,0.8);
    }

    .video-frame iframe {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        border: 0;
    }

    .version-date {
        display: block;
        font-family: var(--mono);
        font-size: 11px;
        color: var(--text-faint);
        margin-top: 20px;
        letter-spacing: 0.04em;
    }

    /* ページロード時のステップ順次表示 */
    .chrome, .page-header, .step, .drop-zone {
        opacity: 0;
        animation: reveal 0.6s cubic-bezier(0.2, 0.6, 0.2, 1) forwards;
    }
    .chrome { animation-delay: 0.05s; }
    .page-header { animation-delay: 0.15s; }
    .step:nth-of-type(1) { animation-delay: 0.30s; }
    .step:nth-of-type(2) { animation-delay: 0.40s; }
    .drop-zone { animation-delay: 0.50s; }
    .step:nth-of-type(3) { animation-delay: 0.62s; }

    @keyframes reveal {
        from { opacity: 0; transform: translateY(8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 520px) {
        main { padding: 48px 16px 72px; }
        .step { padding: 20px; gap: 16px; }
        .step-num { width: 38px; height: 38px; font-size: 13px; }
        .drop-zone { padding: 30px 20px; }
        .bookmarklet-link { padding: 14px 24px; font-size: 15px; }
        .chrome { font-size: 10px; }
    }
    </style>
</head>
<body>
    <main>
        <header class="page-header">
            <h1><span class="accent">webCV</span>メタコピーツール</h1><h2>【ツール概要】低解像度プレビュー画面のメタをコピーして<br>元素材登録画面に反映する</h2>
        </header>

        <div class="steps">
            <section class="step">
                <div class="step-num">1</div>
                <div class="step-body">
                    <p>ブラウザ画面で“ブックマークバー”が表示されていない場合<br>キーボードで <kbd>Ctrl</kbd>+<kbd>Shift</kbd>+<kbd>B</kbd> を押してください</p>
                </div>
            </section>

            <section class="step">
                <div class="step-num">2</div>
                <div class="step-body">
                    <p>下の<strong>「webCVメタコピー」ボタン</strong>を、ブラウザのブックマークバーへ<br>ドラッグ&ドロップ！追加されたお気に入りをクリックしてください。</p>
                </div>
            </section>
